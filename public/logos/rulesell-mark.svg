<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Quality gauge mark: semicircular meter with needle at high position -->
  <!-- Outer arc (the gauge track) -->
  <path d="M4 22a12 12 0 0 1 24 0" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.25"/>
  <!-- Filled arc (quality level - 80% filled) -->
  <path d="M4 22a12 12 0 0 1 22.39-5.96" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Gauge needle pointing to high zone -->
  <line x1="16" y1="22" x2="23.5" y2="11" stroke="#FFD166" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="22" r="2.5" fill="#FFD166"/>
  <!-- Scale marks -->
  <line x1="5.5" y1="17" x2="7" y2="18" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="8" y1="12" x2="9.5" y2="13.2" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="10" x2="16" y2="11.8" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="24" y1="12" x2="22.5" y2="13.2" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="26.5" y1="17" x2="25" y2="18" stroke="#FFD166" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
